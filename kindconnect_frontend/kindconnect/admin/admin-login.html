<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - KindConnect</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="navbar-brand">KindConnect</a>
    <ul class="navbar-nav">
      <li><a href="../index.html" class="nav-link">User Login</a></li>
    </ul>
  </nav>

  <div class="container-sm section">
    <div class="card">
      <h1 class="text-center mb-3">Admin Portal</h1>
      <p class="text-center mb-4" style="color:var(--text-secondary);">Login with administrative credentials</p>

      <div class="alert alert-warning">
        <strong>Default Credentials:</strong><br>
        Email: admin@orphanageapp.com<br>
        Password: Admin@1234
      </div>

      <form onsubmit="handleAdminLogin(event)">
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input type="email" id="email" class="form-control" value="admin@orphanageapp.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter admin password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg mt-3" id="loginBtn">Login as Admin</button>
      </form>

      <p class="text-center mt-3" style="color:var(--text-secondary);">
        Regular user? <a href="../index.html" style="color:var(--primary);">Login here</a>
      </p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    if (isLoggedIn() && isAdmin()) window.location.href = 'admin-dashboard.html';

    async function handleAdminLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Logging in...'; btn.disabled = true;
      try {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const res      = await apiLogin(email, password, 'admin');
        saveSession(res.access_token, 'admin', { email, full_name: 'Admin' });
        showAlert('Admin login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'admin-dashboard.html', 800);
      } catch(err) {
        showAlert('Error: ' + err.message, 'danger');
      } finally {
        btn.textContent = 'Login as Admin'; btn.disabled = false;
      }
    }
  </script>
</body>
</html>
